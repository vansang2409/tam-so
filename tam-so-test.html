hs:"Tự chủ, sáng kiến, dám đi đầu, ý chí mạnh.",watch:"Dễ nóng vội, cô độc, khó phối hợp nhóm."},2:{title:"Số 2 — Người Hòa Giải",keys:["hợp tác","nhạy cảm","ngoại giao","đồng hành"],desc:"Bạn coi trọng các mối quan hệ và giỏi tạo sự hài hòa. Trực giác mạnh giúp bạn cảm nhận cảm xúc người khác trước cả khi họ nói ra. Điểm cần lưu ý: đừng thụ động đến mức quên nhu cầu của chính mình.",strengths:"Tinh tế, kiên nhẫn, biết lắng nghe, gắn kết.",watch:"Né tránh xung đột, dễ phụ thuộc, ngại lên tiếng."},3:{title:"Số 3 — Người Sáng Tạo",keys:["biểu đạt","lạc quan","giao tiếp","nghệ thuật"],desc:"Bạn tràn năng lượng sáng tạo và có duyên giao tiếp, dễ truyền cảm hứng và thu hút bạn bè. Điểm cần lưu ý: kết nối sâu và cam kết lâu dài có thể là thử thách — hãy cho phép mình chạm tới chiều sâu cảm xúc.",strengths:"Hoạt ngôn, vui vẻ, giàu ý tưởng, truyền cảm hứng.",watch:"Tản mạn, ngại cam kết, né tránh chiều sâu."},4:{title:"Số 4 — Người Xây Dựng",keys:["bền bỉ","thực tế","kỷ luật","đáng tin"],desc:'Bạn là nguồn ổn định: chăm chỉ, kiên trì và đáng tin cậy. Bạn tin vào nỗ lực đều đặn để đạt mục tiêu. Điểm cần lưu ý: đừng cứng nhắc với cái "đúng" của mình mà bỏ lỡ cái mới.',strengths:"Trật tự, trung thành, nền nã, có trách nhiệm.",watch:"Bảo thủ, ngại thay đổi, đôi khi khô khan."},5:{title:"Số 5 — Người Tự Do",keys:["tự do","phiêu lưu","linh hoạt","trải nghiệm"],desc:"Bạn khao khát trải nghiệm và đổi thay; sự lặp lại nhàm chán khiến bạn ngột ngạt. Bạn học bằng cách sống và dấn thân. Điểm cần lưu ý: duy trì những mối quan hệ và cam kết bền vững.",strengths:"Năng động, thích nghi nhanh, cởi mở, ham học hỏi.",watch:"Cả thèm chóng chán, thiếu kiên định, bốc đồng."},6:{title:"Số 6 — Người Chăm Sóc",keys:["trách nhiệm","yêu thương","hài hòa","tận tụy"],desc:"Bạn dẫn dắt bằng trái tim, tỏa năng lượng ấm áp và sẵn lòng nâng đỡ người khác. Rất phù hợp vai trò cố vấn, người thầy, người chữa lành. Điểm cần lưu ý: nhớ chăm sóc bản thân như chăm cho người khác.",strengths:"Bao dung, tận tâm, bi
