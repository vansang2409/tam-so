u lên cao tận trời, rốt cuộc rơi chìm xuống lòng đất; ác tới cùng thì tự chuốc lấy lụi tàn."]},37:{thoan:"Gia Nhân (người một nhà, đạo tề gia) — điều cốt yếu là người vợ giữ chính bền, mỗi người làm tròn phận mình thì nhà yên.",hao:["Sơ Cửu: ngay từ đầu lập sẵn nề nếp, phép tắc trong nhà — phòng giữ từ sớm thì về sau hết điều phải hối.","Lục Nhị: không tự tiện ôm đồm việc ngoài phận mình, chỉ giữ đúng vị trí mà lo chu toàn việc trong nhà; giữ chính bền thì tốt lành.","Cửu Tam: cai quản người nhà nghiêm khắc gắt gao — tuy có phần hối tiếc và căng thẳng nhưng cuối cùng vẫn tốt; ngược lại, nếu để vợ con cười cợt buông tuồng thì rốt cuộc mới đáng tiếc.","Lục Tứ: biết vun vén làm cho gia đình thêm sung túc — rất tốt lành.","Cửu Ngũ: như đức của bậc vua lan tỏa khắp nhà bằng tình thương chứ không bằng uy áp — chẳng phải lo gì, tốt lành.","Thượng Cửu: giữ được lòng chí thành lại có uy nghi đáng trọng (uy mà không dữ) — rốt cuộc tốt lành."]},38:{thoan:"Khuê (xa cách, trái lìa, lòng người ly tán) — chưa hợp được việc lớn, nhưng trong những việc nhỏ vẫn có thể thành.",hao:["Sơ Cửu: hết điều phải hối; mất ngựa thì chớ vội đi tìm, tự nó sẽ về; dù gặp phải kẻ không ra gì cũng cứ ôn hòa tiếp xúc thì không lỗi.","Cửu Nhị: tình cờ gặp được bậc bề trên hợp ý nơi ngõ nhỏ — thời ly cách thì một cuộc gặp xuềnh xoàng như vậy cũng quý; không lỗi.","Lục Tam: như chiếc xe bị kéo giật lại, bò kéo bị ghì, lại còn chịu nhục hình — khởi đầu trắc trở ê chề, nhưng rồi gặp được người tương ứng nên kết cục lại tốt.","Cửu Tứ: cô đơn lẻ loi giữa thời ly tán, may gặp được người chính trực cùng chí hướng, chân thành kết hợp với nhau; tuy có phần nguy nhưng không lỗi.","Lục Ngũ: hết điều phải hối; gặp lại người cùng chí thân tín, hợp nhau dễ dàng như cắn qua một miếng da mềm — cứ thế tiến tới thì còn lỗi gì?","Thượng Cửu: cô độc giữa ly tán, ngờ vực tới mức nhìn người thân mà tưởng như con lợn lấm bùn, như cỗ xe chở đầy ma quỷ; giương cung định bắn rồi lại hạ xuống — chợt nhận ra đó là người nhà chứ chẳng phải kẻ thù. Mối ngờ tan như cơn mưa lành tưới xuống; tốt lành."]},39:{thoan:"Kiển (chân khó bước, gặp hiểm phải dừng) — lợi ở phương Tây Nam (đường bằng), bất lợi phương Đông Bắc (núi hiểm); lợi gặp được bậc đại nhân; giữ chính bền thì tốt lành.",hao:["Sơ Lục: cứ tiến tới thì càng thêm gian nan, biết dừng lại chờ thời mới đáng khen.","Lục Nhị: như bề tôi trung xông pha hết hiểm này đến hiểm khác để gánh việc chung, chẳng phải vì lợi riêng — dẫu vất vả vẫn đáng trọng.","Cửu Tam: tiến lên thì gặp hiểm, nên quay trở về — những người ở dưới đang nương cậy sẽ mừng vui đón mình.","Lục Tứ: tiến lên thì gặp hiểm, nên dừng lại — kết hợp với người ở trên mà cùng nhau chung sức vượt khó.","Cửu Ngũ: đang giữa cơn hiểm lớn nhất, nhưng nhờ chính trực mà bạn bè, người cùng chí kéo đến trợ giúp.","Thượng Lục: cứ tiến tới thì chỉ thêm khốn; ở lại mà phò giúp bậc đại nhân ngay bên thì lập được công lớn — tốt lành, lợi ở gặp được người tài đức."]},40:{thoan:"Giải (cởi bỏ, tan hiểm, như sấm mưa gột rửa) — lợi ở phương Tây Nam (chốn bình dị). Nếu không còn việc phải làm thì sớm trở lại nếp cũ là tốt; nếu còn việc phải làm thì làm cho sớm thì tốt.",hao:["Sơ Lục: vừa qua cơn hiểm, cứ điềm tĩnh an phận nghỉ ngơi — không lỗi.","Cửu Nhị: như đi săn bắt được ba con cáo gian, lại được mũi tên vàng — trừ được tiểu nhân nịnh hót mà vẫn giữ đạo ngay thẳng; giữ chính bền thì tốt lành.","Lục Tam: như đứa gánh thuê mà lại ngồi chễm chệ trên xe sang — ở sai vị trí, phô của không phải của mình, chỉ tổ vời trộm cướp; dù cố giữ cũng đáng tiếc.","Cửu Tứ: hãy dứt bỏ kẻ tiểu nhân cứ bám lấy gót chân mình; có thế thì bạn bè chính trực mới tìm đến, cùng nhau tin cậy.","Lục Ngũ: bậc quân tử dứt khoát loại bỏ những gì gây hại — tốt lành; làm được vậy thì ngay cả kẻ tiểu nhân cũng tin phục mà lui đi.","Thượng Lục: như vị chư hầu giương cung bắn trúng con chim cắt đậu trên bức tường cao — trừ được kẻ hung ác ngoan cố ở chỗ cao; mọi bề đều lợi."]},41:{thoan:"Tổn (bớt đi, giảm cái thừa của mình để bù vào chỗ thiếu) — có lòng thành thì rất tốt lành, không lỗi, giữ được chính bền, làm gì cũng lợi. Lễ bạc mà thành (chỉ hai giỏ thóc dâng cúng) vẫn quý.",hao:["Sơ Cửu: gác việc riêng để vội đến giúp người — không lỗi; song cũng nên cân nhắc nên san sẻ tới mức nào cho phải, đừng cạn mình quá.","Cửu Nhị: lợi ở giữ vững chính bền, còn hấp tấp xả thân ra giúp lại hóa dở; giữ tròn phẩm chất của mình cũng đã là giúp người mà chẳng phải hao tổn.","Lục Tam: ba người cùng đi thì ắt phải bớt một (đông quá sinh ngờ vực); một người đi một mình lại tìm được bạn tâm giao — bớt đi để vừa đủ mới hợp.","Lục Tứ: biết bớt đi cái tật của mình, lại mời được người hiền mau đến giúp khiến đôi bên đều mừng — không lỗi.","Lục Ngũ: được cả người lẫn trời cùng giúp — như được tặng mười cặp mai rùa quý báu không thể chối từ; rất tốt lành.","Thượng Cửu: ở chỗ tột cùng của Tổn lại hóa ra làm lợi cho mọi người mà chẳng phải bớt của riêng mình — không lỗi, giữ chính bền thì tốt lành, làm gì cũng lợi, người hiền theo về nhiều không kể xiết."]},42:{thoan:"Ích (thêm vào, làm lợi cho người dưới) — làm gì cũng có lợi, lợi cả việc vượt sông lớn. Bề trên bớt mình để thêm cho dân thì lòng dân theo về.",hao:["Sơ Cửu: đang được giúp sức nên cứ mạnh dạn làm việc lớn; làm cho thật tốt thì dù phận còn thấp cũng không ai chê trách.","Lục Nhị: được giúp đỡ lớn lao không thể chối từ (như mười cặp mai rùa quý); cứ bền giữ chính thì tốt lành — lòng thành ấy dâng lên còn thấu tới trời.","Lục Tam: cái lợi lại đến từ chính những việc chẳng lành (hoạn nạn tôi rèn nên người) — cứ giữ lòng thành, theo đạo trung dung mà làm thì không lỗi, lại được người trên tin dùng.","Lục Tứ: cứ noi theo đường ngay chính thì lời mình khuyên được người trên nghe theo; có thể tin cậy giao cho cả việc trọng đại như dời đô.","Cửu Ngũ: hết lòng chân thành mưu cầu điều lợi cho người dưới — khỏi phải bói hỏi, chắc chắn rất tốt lành; mọi người đều thành tâm cảm cái đức ấy.","Thượng Cửu: ở trên cùng mà chỉ lo vơ vào cho riêng mình, chẳng chịu làm lợi cho ai — nên không ai giúp lại lắm kẻ công kích; lòng tham thay đổi bất nhất; xấu."]},43:{thoan:"Quải (quyết — dứt khoát trừ bỏ cái xấu cuối cùng, như năm hào dương đẩy một hào âm) — phải nêu rõ tội ở chốn công đường, lấy lòng thành kêu gọi đồng lòng mà vẫn ý thức hiểm nguy; trước hết răn bảo người mình, chớ vội dùng binh đao. Như thế thì tiến tới có lợi.",hao:["Sơ Cửu: mới ở dưới đã cậy sức hăm hở xốc tới — lực chưa đủ mà đã tiến thì không thành, đáng bị chê trách.","Cửu Nhị: vừa nơm nớp đề phòng vừa kêu gọi giúp đỡ; dẫu đêm hôm có kẻ rình rập gây hại cũng không phải lo, vì đã cảnh giác sẵn.","Cửu Tam: để lộ vẻ cương quyết hằm hằm ra mặt thì xấu; nhưng người quân tử một lòng trừ gian, dù phải lủi thủi đi một mình, dầm mưa và bị hiểu lầm như kẻ a dua — rốt cuộc vẫn không lỗi.","Cửu Tứ: như người bị lột da mông, bước đi khập khiễng khó nhọc — nóng nảy đơn độc nên bế tắc; giá biết nhún mình đi theo đàn như con cừu thì hết hối, tiếc rằng nghe lời phải mà không chịu tin.","Cửu Ngũ: kẻ tiểu nhân như đám rau sam mọc bám dai, phải nhổ cho tận gốc thật dứt khoát; cứ giữ đạo trung chính mà làm thì không lỗi.","Thượng Lục: là kẻ xấu đơn độc cuối cùng, không còn ai để cậy nhờ kêu cứu — rốt cuộc tất xấu."]},44:{thoan:"Cấu (gặp gỡ bất ngờ — một hào âm chợt hiện dưới năm hào dương, như người con gái quá mạnh bạo lấn lướt) — chớ nên kết thân lâu dài với hạng người (hay thế lực) như vậy.",hao:["Sơ Lục: cái mầm xấu mới chớm phải ghìm chặt lại như cỗ xe chèn phanh sắt — giữ vững thì tốt; buông lỏng cho nó tiến thì như con lợn gầy cứ nhảy nhót loạn xạ, sinh xấu.","Cửu Nhị: như đã có con cá gói sẵn trong bọc — tạm kiềm được mầm xấu thì không lỗi; nhưng chớ để nó lan rộng tới những người khác.","Cửu Tam: nôn nóng muốn tiến mà bước đi khập khiễng đau đớn, thế khá nguy; nhưng vì không dính líu được với mầm xấu nên rốt cuộc cũng không lỗi lớn.","Cửu Tứ: cái bọc mà không còn con cá — để tuột mất, xa rời người dưới đáng lẽ thuộc về mình; như thế sẽ sinh xấu.","Cửu Ngũ: như cây cao tỏa bóng che chở giàn bầu bên dưới; cứ giấu kín tài đức, lấy đức bao dung mà cảm hóa thay vì ra tay áp chế — thì điều tốt lành sẽ tự trên trời rủ xuống.","Thượng Cửu: ở chỗ cao xa mà lánh đời, như giương sừng không cho ai lại gần — có phần đáng tiếc vì chẳng giúp được việc, nhưng giữ được mình trong sạch nên không lỗi."]},45:{thoan:"Tụy (tụ họp, quy về một mối) — như vua đến nhà tông miếu tế lễ tổ tiên (lấy thành kính làm chỗ tụ lòng người); lợi gặp bậc đại nhân thì hanh thông, nhưng phải nhờ giữ chính bền. Lễ trọng, lòng thành thì tốt; làm gì cũng lợi.",hao:["Sơ Lục: có lòng muốn quy tụ mà chưa làm được, trong lòng rối bời; nhưng nếu mạnh dạn kêu gọi đúng người mình nên theo, thì nước mắt chốc lát hóa nụ cười — cứ tiến tới thì không lỗi.","Lục Nhị: được người hợp với mình dìu dắt mà tới — tốt lành, không lỗi; chỉ cần thật lòng thì dù lễ mọn như lễ tế mùa xuân cũng được chấp nhận.","Lục Tam: khao khát hòa nhập mà cứ thở than, loay hoay chẳng được gì; nhưng nếu vươn lên tìm đến người trên chịu đón mình thì không lỗi, chỉ có chút đáng tiếc nhỏ.","Cửu Tứ: ở nơi quy tụ đông người, phải làm cho thật tốt đẹp vì việc chung thì mới không bị chê trách.","Cửu Ngũ: ở ngôi cao mà quy tụ được lòng mọi người — không lỗi; nếu còn ai chưa tin phục, hãy lấy cái đức lớn lao, lâu bền và ngay chính mà cảm hóa, rồi mọi điều đáng hối sẽ tan.","Thượng Lục: ở cuối cùng lẻ loi, than thở khóc lóc vì chưa được hòa nhập; nhưng tấm lòng tha thiết ấy giữ cho mình không mắc lỗi."]},46:{thoan:"Thăng (đi lên, tiến lên dần dần như mầm cây vươn khỏi đất) — hanh thông lớn. Đem đức ấy mà tìm gặp bậc đại nhân thì chớ lo ngại; tiến về phương Nam (chỗ sáng sủa) thì tốt lành.",hao:["Sơ Lục: đi lên mà được người trên vui vẻ đón nhận, dẫn dắt — rất tốt lành.","Cửu Nhị: chỉ cần có lòng chí thành thì dù lễ mọn như lễ tế mùa xuân cũng được chứng nhận — không lỗi.","Cửu Tam: tiến lên thuận lợi băng băng như vào tòa thành bỏ ngỏ, không gì ngăn cản — song chính vì trống trải dễ dàng mà cũng nên dè chừng đừng chủ quan.","Lục Tứ: được bậc trên tin cậy giao cho việc trọng như dâng lễ nơi núi thiêng — tốt lành, không lỗi.","Lục Ngũ: giữ vững chính bền nên được tốt lành; bước lên từng bậc một cách đường hoàng vững chãi, không nhảy vọt.","Thượng Lục: lên tới đỉnh rồi mà vẫn cứ nhắm mắt tiến lên mãi không biết dừng — chỉ còn cách bền lòng giữ chính không lơi thì mới giữ được lợi."]},47:{thoan:"Khốn (khốn cùng, bị vây hãm kìm hãm như cây thiếu chỗ vươn) — trong cảnh khốn vẫn có thể hanh thông. Bậc đại nhân giữ chính bền thì tốt lành, không lỗi. Lúc này nói nhiều cũng chẳng ai tin — cốt ở hành động, không ở lời.",hao:["Sơ Lục: như ngồi trên gốc cây cụt trơ trụi chẳng chỗ nương, lại lạc vào thung lũng tối — ba năm chưa thấy lối thoát; càng giãy giụa bi quan càng lún sâu.","Cửu Nhị: tuy đủ đầy rượu thịt mà chí hướng vẫn bị bó buộc chưa được trọng dụng; rồi bậc bề trên sẽ tìm đến mời — hãy giữ lòng thành kính như khi tế lễ; nôn nóng manh động thì xấu, nhưng giữ mình thì không lỗi.","Lục Tam: tiến thì vướng tảng đá chắn, lùi thì víu nhằm bụi gai; về tới nhà lại chẳng thấy vợ đâu — chỗ dựa cũng mất; xấu. Đây là cảnh càng vùng vẫy liều lĩnh càng khốn.","Cửu Tứ: muốn đến giúp người hợp với mình mà lại chậm chạp ngập ngừng, bị chính sự sang giàu (cỗ xe bịt đồng) níu chân — có điều đáng tiếc, nhưng rốt cuộc vẫn tốt.","Cửu Ngũ: bị tổn thương cả trên lẫn dưới, lại bị chính những kẻ giúp việc vây hãm; nhưng cứ thong thả, bền lòng thành kính như khi tế lễ thì dần dần sẽ được toại nguyện.","Thượng Lục: khốn tới mức như bị dây leo quấn chặt, chênh vênh chỗ cao; cứ ngại rằng hễ động là hối. Nhưng nếu biết ăn năn lối cũ rồi mạnh dạn bước tới, thì lại hóa tốt lành — khốn cùng tắc biến."]},48:{thoan:"Tỉnh (cái giếng) — làng mạc có thể dời, nhưng giếng thì không đổi. Nước giếng không cạn cũng không tràn, người đến kẻ đi đều múc dùng được. Nhưng nếu gần múc xong mà dây chưa tới nước đã làm vỡ gàu thì hỏng — làm việc gì cũng phải tới nơi tới chốn.",hao:["Sơ Lục: như cái giếng vẩn bùn không ai buồn uống, giếng cũ hoang phế đến chim cũng chẳng lui tới — người bỏ bê mình, không tu dưỡng thì cũng thành vô dụng như vậy.","Cửu Nhị: vốn có mạch nước trong, nhưng nước cứ rò xuống nuôi mấy con tôm tép nơi đáy, như múc nước bằng cái giỏ thủng — có tài mà không được dùng đúng, uổng phí.","Cửu Tam: giếng đã vét trong sạch mà chẳng ai đến múc — thật đáng tiếc; giá gặp được người trên sáng suốt biết dùng thì cả mình lẫn người đều được nhờ.","Lục Tứ: như cái giếng đang được xây lát kỹ càng — tạm thời lo củng cố, tu sửa chính mình; tuy chưa giúp được ai nhưng không lỗi.","Cửu Ngũ: như giếng nước trong veo mát lành, mạch suối ngọt ai cũng múc uống được — người có đức tài đem ra giúp đời, rất tốt.","Thượng Lục: nước đã kéo lên tới miệng giếng, không đậy che mà để mọi người cùng dùng — tấm lòng rộng mở, thành thật và vô tận như mạch giếng; rất tốt lành."]},49:{thoan:"Cách (thay đổi tận gốc, như loài thú thay lông, như cách mạng) — việc đổi thay thường chỉ được tin sau khi đã thành. Hanh thông lớn, lợi ở giữ chính bền; làm đúng thì mọi điều đáng hối tan biến. Đổi thay phải đúng lúc, đúng lẽ, hợp lòng người.",hao:["Sơ Cửu: lúc đầu chưa đủ thời, chớ vội đổi thay — hãy tự kiềm mình lại chắc như buộc bằng dây da bò vàng, giữ vững mà chờ.","Lục Nhị: chờ cho thời cơ đã chín muồi rồi mới ra tay thay đổi — hành động lúc này thì tốt lành, không lỗi.","Cửu Tam: vội vàng đổi thay thì xấu, dù có chính đáng cũng đầy nguy; phải bàn đi bàn lại cho thấu đáo nhiều lần, hợp lòng người thì mới được tin theo.","Cửu Tứ: mọi điều đáng hối tiêu tan; khi đã được lòng tin, thì dẫu thay đổi cả những phép tắc cũ cũng đem lại tốt lành.","Cửu Ngũ: bậc đại nhân làm cuộc đổi mới rạng rỡ rõ ràng như con hổ thay bộ lông vằn mới — chưa cần bói toán, lòng người đã tin phục sẵn.","Thượng Lục: người quân tử hoàn tất đổi thay đẹp đẽ như con báo đổi bộ lông đốm; kẻ tiểu nhân ít ra cũng đổi sắc mặt mà thuận theo. Đổi tới đây là đủ, chớ tham làm tới nữa — cứ yên giữ chính bền thì tốt lành."]},50:{thoan:"Đỉnh (cái vạc ba chân — vật quý nấu nướng để nuôi người hiền và tế lễ) — hanh thông lớn. Lấy điều chính đáng, tinh túy mà nuôi dưỡng người tài đức.",hao:["Sơ Lục: cái vạc bị lật chổng chân lên — tưởng dở, nhưng nhờ vậy mà trút được hết cặn bẩn cũ để chứa cái mới; như người vợ lẽ nhờ sinh con hiền mà được trọng; không lỗi.","Cửu Nhị: cái vạc đầy ắp thức ăn ngon (mình có thực tài, thực đức); kẻ ghen ghét dẫu hậm hực cũng không tới gần làm hại được — tốt lành.","Cửu Tam: quai vạc bị xộc xệch nên tạm khựng lại, miếng thịt trĩ béo ngon trong vạc chưa ai dùng tới — tài hay mà chưa gặp dịp; nhưng rồi như cơn mưa lành sẽ tới, hết điều phải hối, rốt cuộc tốt lành.","Cửu Tứ: chân vạc gãy, đổ tung cả mâm cỗ đang dâng cho vua — gánh việc lớn quá sức hoặc tin dùng kẻ kém, làm hỏng việc, xấu hổ ê chề; xấu.","Lục Ngũ: cái vạc có quai vàng, vòng xách bằng kim loại chắc — bậc trên giữ đức trung, khiêm nhường đón người hiền; lợi ở giữ chính bền.","Thượng Cửu: cái vạc có vòng xách bằng ngọc — cứng cáp mà vẫn ôn hòa nhuần nhị; rất tốt lành, làm gì cũng thuận lợi."]},51:{thoan:"Chấn (sấm động, chấn động đột ngột) — qua được thì hanh thông. Khi tiếng sấm ập tới khiến muôn người kinh sợ, người biết đạo vẫn nơm nớp đề phòng mà vẫn ung dung cười nói — vững như người chủ tế không vì sấm mà rơi muỗng rượu cúng. Biết kính sợ mà không hoảng loạn.",hao:["Sơ Cửu: tiếng sấm chợt tới, thoạt đầu giật mình nơm nớp, nhưng nhờ biết lo giữ mình nên sau đó lại ung dung cười nói — tốt lành.","Lục Nhị: cơn chấn động ập đến giữa thế nguy; chi bằng tạm buông bỏ của cải mà lánh lên chỗ cao cho an toàn — chớ tiếc đuổi theo, qua cơn rồi (chừng bảy ngày) thứ đã mất sẽ tự về.","Lục Tam: kinh hoàng thất thần giữa cơn chấn động; nhưng nếu biết lấy cú sốc ấy làm động lực để chỉnh mình hành động cho phải, thì không lỗi.","Cửu Tứ: cơn chấn động khiến mình đờ ra, càng lúc càng lún sâu vào bùn lầy — mất hết nhuệ khí, sa lầy bế tắc (lời nhắc chớ để hoàn cảnh nhấn chìm mình).","Lục Ngũ: sấm động dồn dập, tới lui đều nguy; nhưng nhờ giữ được đạo trung nên rốt cuộc chẳng mất mát gì, vẫn gánh vác được việc của mình.","Thượng Lục: sợ tới mức hồn vía lên mây, ngơ ngác run rẩy nhìn quanh; lúc này mà manh động thì xấu. Nhưng nếu biết lo phòng bị từ sớm, khi tai biến còn chưa đụng tới mình và người quanh, thì không lỗi — dẫu có bị người thân chê là nhát cũng mặc."]},52:{thoan:"Cấn (núi, sự dừng lại, tĩnh tại đúng chỗ) — biết dừng như tấm lưng yên (chỉ lo đứng thẳng, không đua đòi theo ngoại vật), tới mức quên cả cái tôi; đi giữa sân mà như không thấy ai làm động lòng — thì không lỗi. Cốt ở giữ tâm an định nơi điều chính.",hao:["Sơ Lục: biết dừng lại đúng mực ngay từ ngón chân — giữ mình từ bước đầu, việc nhỏ; không lỗi, chỉ cần bền lòng giữ chính cho lâu dài.","Lục Nhị: dừng lại nơi bắp chân; muốn đi theo giúp người trên mà chẳng cản nổi họ lao tới, đành dừng, trong lòng có phần ấm ức không yên.","Cửu Tam: gò ép bắt mình dừng cứng nơi lưng eo, cứng nhắc đến như tách rời thân trên thân dưới — thế nguy; lòng nóng ran như lửa đốt vì cố nén. Dừng mà gượng ép thái quá thì khổ.","Lục Tứ: biết giữ cho cả tấm thân được yên tĩnh, an phận đúng chỗ — không lỗi.","Lục Ngũ: biết giữ gìn nơi miệng lưỡi, nói năng chừng mực có thứ lớp, không lỡ lời — mọi điều đáng hối tan biến.","Thượng Cửu: một lòng đôn hậu giữ trọn được sự tĩnh tại tới cùng, vững vàng như ngọn núi — tốt lành."]},53:{thoan:"Tiệm (tiến lên dần dần theo thứ tự, như đàn nhạn bay có hàng lối) — như việc cưới gả người con gái phải qua từng bước lễ nghi đàng hoàng thì tốt lành. Lợi ở giữ chính bền; tiến từ từ đúng trình tự mới vững.",hao:["Sơ Lục: đàn nhạn dần tới bờ nước; như người trẻ mới chập chững vào đời, thế còn chông chênh và bị lời ra tiếng vào — nhưng cứ giữ mình thì không lỗi.","Lục Nhị: đàn nhạn tiến tới phiến đá lớn an toàn, ăn uống thong dong vui vẻ — gặp chỗ yên ổn, lại được chia sẻ; tốt lành.","Cửu Tam: đàn nhạn tiến nhầm ra gò đất khô cằn trơ trọi; như cảnh chồng liều đi xa không về, vợ có thai mà chẳng giữ được con — nóng vội tiến bừa, lìa bầy thì xấu; sức ấy chỉ nên dùng vào việc phòng giữ chống kẻ cướp.","Lục Tứ: đàn nhạn tiến lên đậu trên cây — vốn chân nhạn không quen bám cành, nhưng khéo tìm được cành bằng phẳng mà đậu tạm yên; biết tùy cảnh an thân thì không lỗi.","Cửu Ngũ: đàn nhạn tiến lên gò cao; như người vợ ba năm chưa thể có con vì bị hiểu lầm ngăn trở, nhưng rồi lẽ tự nhiên không gì cản nổi, cuối cùng vẫn vẹn toàn — tốt lành.","Thượng Cửu: đàn nhạn bay lên tới tầng cao thoáng đãng, hàng lối ngay ngắn; bộ lông đẹp đẽ ấy đáng dùng làm vật trang trí — nên gương cao khiết cho người đời; tốt lành."]},54:{thoan:"Quy Muội (gả em gái đi lấy chồng, cuộc kết hợp không chính danh, thiếu lễ) — cứ thế mà manh động thì xấu, chẳng có lợi gì. Lời nhắc: vào việc gì cũng cần danh chính, đúng lễ, đúng vị; nếu chỉ chiều theo tình thì dễ hỏng.",hao:["Sơ Cửu: phận làm vợ lẽ, vị trí khiêm nhường; như người què một chân mà vẫn ráng bước đi được — biết an phận làm tròn việc của mình thì tiến tới vẫn tốt.","Cửu Nhị: như người chột một mắt mà vẫn trông thấy; tuy gặp người bạn đời không xứng, cứ giữ lòng son sắt thủy chung như người quả phụ một dạ thì vẫn có lợi.","Lục Tam: vì buông thả thiếu đoan chính nên chẳng được cưới hỏi tử tế; đành quay về chịu phận thấp kém — lời nhắc giữ mình đoan trang mới mong được trọng.","Cửu Tứ: người con gái hiền chưa vội xuất giá, thong thả chờ đúng người đúng duyên; có muộn đôi chút nhưng rồi mối lành sẽ tới — chờ được thì hơn.","Lục Ngũ: như nàng công chúa cao quý đi lấy chồng mà phục sức còn giản dị hơn cả người hầu đi cùng — trọng đức hạnh bên trong hơn vẻ phô trương; đẹp dịu như vầng trăng gần tròn (khiêm nhường, không lấn át chồng); tốt lành.","Thượng Lục: cô dâu bưng giỏ lễ mà giỏ rỗng không, chú rể làm thịt cừu mà chẳng có máu — lễ có hình mà không có thực, kết hợp hữu danh vô thực; chẳng có lợi gì cả."]},55:{thoan:"Phong (thịnh vượng dồi dào tới đỉnh) — hanh thông phát triển. Đang lúc cực thịnh thì chớ lo sợ vẩn vơ, hãy như mặt trời đứng bóng tỏa sáng khắp nơi. (Nhưng ngầm nhắc: mặt trời đứng bóng rồi sẽ xế — hãy biết giữ.)",hao:["Sơ Cửu: gặp được người cộng sự xứng tầm với mình; dù hai bên cùng kiểu cương cường, hợp sức buổi đầu thì không lỗi — cứ tiến tới sẽ được tán thưởng.","Lục Nhị: bị che lấp dày tới mức giữa trưa mà nhìn thấy cả sao Bắc Đẩu — tài năng bị khuất bởi người trên mờ tối; nếu hấp tấp tiến lên thì bị nghi kỵ. Hãy bền giữ lòng chí thành để cảm hóa dần, thì rồi sẽ tốt.","Cửu Tam: bị che phủ còn dày hơn, giữa trưa mà chỉ thấy được ngôi sao mờ — như người gãy mất cánh tay phải, mất chỗ nương để thi thố; thời chưa tới đành chịu, nhưng tự mình giữ được nên không lỗi.","Cửu Tứ: cũng bị màn che tối mịt, giữa trưa thấy sao Bắc Đẩu; nhưng may gặp được người ngang tài cùng chí hướng để nương tựa — hợp lực thì tốt lành.","Lục Ngũ: bậc trên biết chiêu vời, quy tụ những người tài giỏi rực rỡ về giúp mình — thật đáng mừng đáng khen; tốt lành.","Thượng Lục: nhà cửa làm thật to nhưng hóa ra chỉ để che chắn, tự giam mình; ngó ra cửa thì vắng tanh, ba năm chẳng thấy một bóng người lui tới — kiêu mãn tự cô lập giữa lúc đỉnh cao; xấu."]},56:{thoan:"Lữ (kẻ lữ hành nơi đất khách) — chỉ nên mong thành tựu nhỏ và tiến chút ít. Người đi xa biết khiêm nhường và giữ mình ngay thẳng thì gặp tốt lành. Đất khách quê người, cốt ở thận trọng và chính trực.",hao:["Sơ Lục: nơi đất khách mà để mình nhỏ nhen, bám víu vào những việc ti tiện vụn vặt — chính vì vậy mà tự rước thêm tai vạ vào thân.","Lục Nhị: nơi đất khách mà có chỗ trọ tử tế, mang theo đủ lộ phí, lại được người giúp việc trung thành tin cậy — yên ổn, tốt.","Cửu Tam: nơi đất khách mà cương cường nóng nảy quá mức nên để cháy mất chỗ trọ, lại mất luôn người giúp việc — dù có gắng giữ chính thì thế vẫn nguy. Đi xa chớ ngạo mạn.","Cửu Tứ: người đi xa tạm tìm được chỗ tá túc, có cả lộ phí lẫn cái rìu phòng thân; nhưng vẫn chưa được đúng vị trí mong muốn nên trong lòng chưa thật an.","Lục Ngũ: như đi bắn con chim trĩ, tuy mất một mũi tên nhưng được chim — chịu bỏ chút vốn nhỏ mà gặp được người, được việc; rốt cuộc được khen ngợi và giao cho trọng trách.","Thượng Cửu: như con chim tự đốt cháy tổ của mình; kẻ đi xa mà kiêu căng ngạo mạn, thoạt đầu nhơn nhơn cười đắc ý rồi sau phải kêu khóc; đánh mất sự nhu thuận mềm mỏng quá dễ dàng — xấu."]},57:{thoan:"Tốn (gió, sự thuận theo và thấm nhập nhẹ nhàng như gió len lỏi khắp nơi) — thành tựu nhỏ và tiến được chút ít. Cứ thuận theo lẽ phải mà tiến thì có lợi; lợi ở gặp được bậc đại nhân. Mềm mại thấm dần hơn là cưỡng ép.",hao:["Sơ Lục: cứ lúc tiến lúc lùi, do dự không quyết — nhu thuận mà thiếu chủ kiến; nên rèn thêm chút quả cảm cương quyết như người lính thì mới có lợi.","Cửu Nhị: khiêm nhún tới mức như nép mình dưới gầm giường để dò xét điều khuất tất, lại cẩn thận cầu cả thầy bói thầy cúng giúp xét — tuy rối rắm vất vả nhưng thành tâm cặn kẽ nên tốt, không lỗi.","Cửu Tam: gắng gượng ép mình thuận theo hết lần này lần khác một cách miễn cưỡng nhăn nhó — thuận mà không thật lòng thì đáng tiếc.","Lục Tứ: mọi điều đáng hối đã qua; như cuộc đi săn được nhiều, đủ dùng cho cả ba việc (tế lễ, đãi khách, bếp ăn) — biết nhún nhường đúng chỗ nên lập được công, rất tốt.","Cửu Ngũ: giữ chính bền thì tốt lành, hết điều phải hối, mọi việc đều thuận lợi; có thể khởi đầu chưa hay nhưng kết thúc tốt đẹp. Trước khi thay đổi điều gì hãy cân nhắc kỹ trước sau cho chín — như vậy thì tốt.","Thượng Cửu: nhún nhường tới mức nhu nhược hèn yếu, nép mãi dưới gầm giường, lại đánh mất luôn cái rìu quyết đoán của mình — thuận theo thái quá đến mất cả chủ kiến; dù cố giữ chính cũng xấu."]},58:{thoan:"Đoài (đầm nước, niềm vui và sự hòa duyệt) — hanh thông, có thành tựu. Nhưng niềm vui phải đặt trên nền chân thành ngay chính: lợi ở giữ chính bền, kẻo vui quá hóa buông tuồng.",hao:["Sơ Cửu: niềm vui trong trẻo nảy từ sự hòa hợp tự trong lòng, không lụy vào ai hay vật gì bên ngoài — tốt lành.","Cửu Nhị: niềm vui đến từ tấm lòng chân thật bên trong; tốt lành, mọi điều đáng hối tan biến — dù bên cạnh có chút cám dỗ cũng không sa ngã.","Lục Tam: đi tìm vơ về đủ mọi thú vui bên ngoài để chiều chuộng bản thân — vui mà lệ thuộc, buông thả; xấu.","Cửu Tứ: còn đang cân nhắc nên tìm niềm vui nơi đâu, lòng chưa yên; tuy kề cận thú vui dễ hại, nhưng nhờ biết đắn đo phân biệt mà rốt cuộc lại có điều đáng mừng.","Cửu Ngũ: nhẹ dạ tin vào kẻ thực ra chỉ chực làm hại mình (như kẻ siểm nịnh ngọt ngào kề bên) — thế khá nguy; nên cảnh giác mà giữ mình.","Thượng Lục: lấy việc lôi kéo, dẫn dụ người khác cùng chạy theo thú vui làm niềm vui của mình — mê hoặc người mà bản thân cũng không tự chủ; chớ để cuốn theo."]},59:{thoan:"Hoán (tan rã, ly tán — lòng người rời rạc, như gió thổi làm nước tản ra) — nhưng vẫn có thể hanh thông. Vua đến tông miếu (lấy lòng thành quy tụ nhân tâm); lợi ở việc vượt sông lớn, lợi ở giữ chính bền. Cốt ở gom cái đã tan trở lại.",hao:["Sơ Lục: lòng người mới chớm rời rạc, kịp ra tay hàn gắn ngay từ sớm; lại được người mạnh (như con ngựa khỏe) trợ giúp — gỡ sớm thì dễ, tốt lành.","Cửu Nhị: giữa cơn ly tán hiểm nguy, mau chạy về nương tựa vào chỗ dựa vững (người đồng tâm) — hết điều phải hối.","Lục Tam: quên cả lợi riêng của bản thân, một lòng vì việc chung mà ra sức chống lại sự tan rã — không có gì phải hối.","Lục Tứ: dẹp tan các phe cánh bè phái chia rẽ, rồi từ đám tan rã ấy lại quy tụ được những người tốt thành một khối lớn vững như gò đồi — rất tốt lành, đó là tầm nhìn mà người tầm thường không nghĩ ra được.","Cửu Ngũ: bậc trên ban hiệu lệnh lớn lao thấm tới muôn người như mồ hôi toát khắp thân; lại mở kho lẫm phân phát của cải để quy tụ lòng dân — không lỗi.","Thượng Cửu: kịp trừ khử mối họa máu me, đưa mình và người thân tránh xa khỏi vòng hiểm nguy và nỗi sợ hãi — biết liệu đường thoát thì không lỗi."]},60:{thoan:"Tiết (chừng mực, điều độ, sự tiết chế như đốt tre có ngấn) — biết giữ chừng mực thì hanh thông. Nhưng nếu đặt phép tắc quá khắc nghiệt gò bó thì không thể bền lâu — tiết chế cũng cần vừa phải.",hao:["Sơ Cửu: biết tự giữ, chưa vội bước ra khỏi sân ngoài cửa — lúc chưa phải thời thì điềm tĩnh chờ, không hấp tấp; không lỗi.","Cửu Nhị: đến lúc đáng phải ra tay hành động thì lại chần chừ, không chịu bước ra khỏi cả sân trong — tiết chế giữ mình thái quá đến mức bỏ lỡ thời cơ; xấu.","Lục Tam: không chịu sống có chừng mực, buông tuồng phóng túng, để rồi sau phải than thở — nhưng đó là lỗi tự mình chuốc lấy, chẳng trách được ai.","Lục Tứ: sống điều độ chừng mực một cách tự nhiên thanh thản, thuận theo lẽ chứ không gò ép khổ sở — hanh thông, thành công.","Cửu Ngũ: tự mình giữ chừng mực, lại đặt ra phép tắc vừa phải hợp tình khiến người dễ vui lòng theo (ngọt mà thuận) — tốt lành; cứ thế tiến lên thật đáng khâm phục.","Thượng Lục: đặt ra kỷ luật quá hà khắc gò bó ngặt nghèo — dù có ngay chính thì cũng sinh xấu; song nếu biết kịp nới lỏng lại cho vừa phải, thì điều đáng hối rồi cũng qua."]},61:{thoan:"Trung Phu (lòng chí thành tự đáy lòng) — thành thật tới mức cảm hóa được cả loài vật chậm hiểu (như heo, cá) thì tốt lành. Lợi ở việc vượt sông lớn, lợi ở giữ chính bền. Chân thành là cái gốc để cảm người, cảm vật.",hao:["Sơ Cửu: giữ lòng chí thành an định ngay nơi chính mình thì tốt lành; nếu để lòng chạy theo, cậy nhờ cái khác bên ngoài thì lại chẳng được yên.","Cửu Nhị: như con hạc mẹ cất tiếng kêu nơi khuất nẻo, đàn con liền đồng thanh đáp lại — tấm lòng chân thành tự khắc cảm ứng tới người đồng điệu, dù ở xa; ấm áp như cùng nhau san sẻ một chén rượu ngon.","Lục Tam: gặp được người mình gắn bó, nhưng đặt hết lòng vào người nên cảm xúc lên xuống thất thường — khi gõ trống vui, khi lại bỏ dở; khi khóc, khi hát. Thành thật mà lệ thuộc thì chông chênh.","Lục Tứ: như vầng trăng gần tròn đầy, đức gần trọn vẹn; như con ngựa dứt khoát rời bạn cùng cặp để một lòng tiến theo chủ — bỏ vây cánh riêng mà hướng về bậc trên; không lỗi.","Cửu Ngũ: bậc trên có lòng chí thành tột bậc, cảm hóa và gắn kết mọi người lại với mình thành một khối bền chặt — không lỗi.","Thượng Cửu: như con gà trống chỉ giỏi gáy mà đòi bay vút lên trời — hư danh vượt quá thực chất, lời nói át việc làm; dù có giữ chính thì cũng xấu."]},62:{thoan:"Tiểu Quá (hơi vượt mức ở việc nhỏ — cái nhỏ, cái mềm đang trội) — vẫn hanh thông, nhưng lợi ở giữ chính. Chỉ nên hơi quá ở việc nhỏ (như khiêm cung, tiết kiệm, thương xót), không nên ở việc lớn. Như tiếng chim bay để lại: bay xuống đậu thì hơn bay vút lên — biết hạ mình, giữ thấp thì rất tốt.",hao:["Sơ Lục: vừa khởi đã ham bay vút lên cao như con chim vượt quá sức mình — nóng vội vượt phận thì hỏng; xấu.","Lục Nhị: đi quá người gần để gặp đúng người hợp với mình hơn (như bỏ ông mà gặp bà); với bậc trên thì không lấn vượt, chỉ giữ đúng phận bề tôi khiêm cung — chừng mực như vậy thì không lỗi.","Cửu Tam: cậy mình mạnh nên xem thường, không chịu đề phòng cẩn mật những kẻ nhỏ nhen rình hại — để chúng có cơ hội ra tay; xấu. Thời này cái nhỏ đang trội, chớ khinh địch.","Cửu Tứ: biết liệu việc mà không quá đà nên không lỗi; nhưng nếu cứ hăng tiến tới thì nguy, phải hết sức dè dặt — chớ khăng khăng cứng rắn mãi, lúc này nên mềm mỏng giữ mình.","Lục Ngũ: mây kéo dày đặc mà vẫn chưa thành mưa — thế lực còn yếu, ân trạch chưa đủ thấm; như bậc vương công chỉ bắn (thu phục) được con chim nấp ngay trong hang gần — làm được việc nhỏ trong tầm tay, chưa nên mong việc lớn.","Thượng Lục: không biết liệu việc, lại vượt mức quá xa, như con chim bay tít mù lên cao không chịu đậu xuống — xấu; đây gọi là tai vạ do tự mình gây ra."]},63:{thoan:"Ký Tế (đã hoàn thành, việc đã qua sông, mọi sự đã yên ổn vào nếp) — chỉ còn hanh thông ở những việc nhỏ. Lợi ở giữ chính bền. Khởi đầu tốt đẹp, nhưng coi chừng về cuối lại sinh rối loạn — thành rồi vẫn phải giữ.",hao:["Sơ Cửu: vừa làm xong việc thì biết ghìm mình dừng lại (như kéo phanh xe lại), như con cáo ướt đuôi không liều lội thêm — biết dừng đúng lúc thì không lỗi.","Lục Nhị: như người phụ nữ đoan chính mất tấm rèm che xe — tạm mất phương tiện; chớ vội cuống cuồng đi tìm, cứ giữ mình, qua một chu kỳ (bảy ngày) rồi tự được lại.","Cửu Tam: như vua Cao Tông xưa đem quân đánh xứ xa, ròng rã ba năm mới dẹp xong — việc lớn thì gian nan hao tổn, phải kiên trì; và chớ giao cho kẻ tiểu nhân gánh vác.","Lục Tứ: như người đi thuyền chuẩn bị sẵn giẻ rách để bít chỗ rò, suốt ngày nơm nớp cảnh giác — lúc đang yên ổn vẫn biết phòng xa hiểm họa thì mới giữ được.","Cửu Ngũ: nhà phương Đông mổ cả con bò làm cỗ lớn linh đình, lại không bằng lễ mọn đạm bạc mùa xuân của nhà phương Tây — vì bên kia có lòng thành kính nên mới thực được phúc. Cốt ở thành tâm chứ không ở phô trương.","Thượng Lục: đã tới chỗ tột cùng của sự thành mà vẫn còn liều tiến, như người lội nước để ngập cả đầu — không biết dừng thì nguy. Thành tựu tới đỉnh, hãy biết giữ."]},64:{thoan:"Vị Tế (chưa hoàn thành, chưa qua sông — việc còn dở dang, một khởi đầu mới) — vẫn có thể hanh thông. Nhưng như con cáo non gần qua được sông thì lại ướt cả đuôi: nóng vội, thiếu cẩn trọng tới phút chót thì hỏng, chẳng lợi gì. (Kinh Dịch khép lại không bằng quẻ đã xong mà bằng quẻ chưa xong — vạn vật xoay vần, không có trạng thái hoàn tất vĩnh viễn.)",hao:["Sơ Lục: nóng vội xông tới khi sức chưa đủ, như con cáo lội nước bị ướt cả đuôi — chưa lượng sức mình mà đã làm liều; đáng tiếc.","Cửu Nhị: biết ghìm mình kéo xe lại, nén lòng chờ đúng thời cơ chứ không xông bừa; giữ chính bền thì tốt lành.","Lục Tam: việc còn dang dở chưa xong mà cứ liều tiến tới thì xấu; nhưng đã tới lúc nên chuẩn bị cho cuộc vượt sông lớn — hãy tích đủ lực rồi mới dấn bước thì mới nên.","Cửu Tứ: giữ chính bền thì tốt lành, hết điều phải hối; nhưng phải vùng dậy gắng sức bền bỉ như khi đem quân đi chinh phạt xứ xa — ròng rã ba năm mới có công được tưởng thưởng. Việc lớn cần kiên trì lâu dài.","Lục Ngũ: giữ chính bền nên được tốt lành, không có gì phải hối; rạng rỡ sáng suốt như bậc quân tử, lại đầy lòng chân thành — tốt lành.","Thượng Cửu: việc gần xong, giữ lòng tin thư thái mà vui chừng mực thì không lỗi; nhưng nếu quá chén, buông thả tự mãn đến mức như ngập cả đầu xuống nước, thì lại đánh mất lẽ phải. Sắp tới đích càng phải giữ mình."]}},In={Càn:{bits:"111",sym:"☰",nghia:"Trời",hanh:"Kim",nguoi:"Cha",than:"Đầu",huong:"Tây Bắc",tinh:"Cương kiện, sáng tạo"},Đoài:{bits:"110",sym:"☱",nghia:"Đầm/Hồ",hanh:"Kim",nguoi:"Thiếu nữ",than:"Miệng",huong:"Tây",tinh:"Vui vẻ, cởi mở"},Ly:{bits:"101",sym:"☲",nghia:"Lửa",hanh:"Hỏa",nguoi:"Trung nữ",than:"Mắt",huong:"Nam",tinh:"Sáng tỏ, bám víu"},Chấn:{bits:"100",sym:"☳",nghia:"Sấm",hanh:"Mộc",nguoi:"Trưởng nam",than:"Chân",huong:"Đông",tinh:"Chấn động, khởi phát"},Tốn:{bits:"011",sym:"☴",nghia:"Gió",hanh:"Mộc",nguoi:"Trưởng nữ",than:"Đùi",huong:"Đông Nam",tinh:"Thuận nhập, lan tỏa"},Khảm:{bits:"010",sym:"☵",nghia:"Nước",hanh:"Thủy",nguoi:"Trung nam",than:"Tai",huong:"Bắc",tinh:"Hiểm, sa hãm"},Cấn:{bits:"001",sym:"☶",nghia:"Núi",hanh:"Thổ",nguoi:"Thiếu nam",than:"Tay",huong:"Đông Bắc",tinh:"Dừng lại, tĩnh tại"},Khôn:{bits:"000",sym:"☷",nghia:"Đất",hanh:"Thổ",nguoi:"Mẹ",than:"Bụng",huong:"Tây Nam",tinh:"Nhu thuận, dung chứa"}},xe=[{n:1,ten:"Thuần Càn",lo:"Càn",up:"Càn",y:"Sáng tạo, cương kiện, hanh thông — thời của bậc quân tử tiến tới."},{n:2,ten:"Thuần Khôn",lo:"Khôn",up:"Khôn",y:"Nhu thuận, bao dung, nâng đỡ — thuận theo và chứa đựng."},{n:3,ten:"Thủy Lôi Truân",lo:"Chấn",up:"Khảm",y:"Khởi đầu gian nan, cần kiên trì và trợ giúp."},{n:4,ten:"Sơn Thủy Mông",lo:"Khảm",up:"Cấn",y:"Còn non dại, cần học hỏi và được khai mở."},{n:5,ten:"Thủy Thiên Nhu",lo:"Càn",up:"Khảm",y:"Chờ đợi đúng thời, nuôi dưỡng và nhẫn nại."},{n:6,ten:"Thiên Thủy Tụng",lo:"Khảm",up:"Càn",y:"Tranh tụng, bất hòa — nên hòa giải, tránh kiện cáo."},{n:7,ten:"Địa Thủy Sư",lo:"Khảm",up:"Khôn",y:"Dụng binh, tổ chức kỷ luật, cần chính danh."},{n:8,ten:"Thủy Địa Tỷ",lo:"Khôn",up:"Khảm",y:"Thân ái, đoàn kết, nương tựa lẫn nhau."},{n:9,ten:"Phong Thiên Tiểu Súc",lo:"Càn",up:"Tốn",y:"Tích nhỏ, kìm hãm tạm thời, chờ tích lũy đủ."},{n:10,ten:"Thiên Trạch Lý",lo:"Đoài",up:"Càn",y:"Bước đi thận trọng, giữ lễ, đạp lên nguy mà an."},{n:11,ten:"Địa Thiên Thái",lo:"Càn",up:"Khôn",y:"Hanh thông, trên dưới giao hòa, mọi việc suôn sẻ."},{n:12,ten:"Thiên Địa Bĩ",lo:"Khôn",up:"Càn",y:"Bế tắc, trên dưới cách trở — giữ mình chờ thời."},{n:13,ten:"Thiên Hỏa Đồng Nhân",lo:"Ly",up:"Càn",y:"Đồng lòng, hợp quần, chí hướng chung."},{n:14,ten:"Hỏa Thiên Đại Hữu",lo:"Càn",up:"Ly",y:"Giàu có lớn, thịnh vượng — cần khiêm nhường."},{n:15,ten:"Địa Sơn Khiêm",lo:"Cấn",up:"Khôn",y:"Khiêm tốn, nhún nhường — đạo bền vững."},{n:16,ten:"Lôi Địa Dự",lo:"Khôn",up:"Chấn",y:"Vui hòa, hứng khởi, chuẩn bị và thuận thời."},{n:17,ten:"Trạch Lôi Tùy",lo:"Chấn",up:"Đoài",y:"Tùy thuận, đi theo lẽ phải, linh hoạt."},{n:18,ten:"Sơn Phong Cổ",lo:"Tốn",up:"Cấn",y:"Chỉnh đốn việc đổ nát, sửa sai cái cũ."},{n:19,ten:"Địa Trạch Lâm",lo:"Đoài",up:"Khôn",y:"Tiến tới, lớn mạnh, lãnh đạo bằng đức."},{n:20,ten:"Phong Địa Quán",lo:"Khôn",up:"Tốn",y:"Quan sát, chiêm nghiệm, lấy mình làm gương."},{n:21,ten:"Hỏa Lôi Phệ Hạp",lo:"Chấn",up:"Ly",y:"Cắn vỡ trở ngại, dùng hình phạt minh bạch."},{n:22,ten:"Sơn Hỏa Bí",lo:"Ly",up:"Cấn",y:"Trang sức, vẻ đẹp hình thức — chú trọng cả nội dung."},{n:23,ten:"Sơn Địa Bác",lo:"Khôn",up:"Cấn",y:"Bóc mòn, suy lạc — nên giữ gìn, chờ phục."},{n:24,ten:"Địa Lôi Phục",lo:"Chấn",up:"Khôn",y:"Trở lại, hồi sinh, dương khí quay về."},{n:25,ten:"Thiên Lôi Vô Vọng",lo:"Chấn",up:"Càn",y:"Chân thành, không vọng tưởng, thuận tự nhiên."},{n:26,ten:"Sơn Thiên Đại Súc",lo:"Càn",up:"Cấn",y:"Tích lớn, nuôi dưỡng tài lực, kiềm chế đúng lúc."},{n:27,ten:"Sơn Lôi Di",lo:"Chấn",up:"Cấn",y:"Nuôi dưỡng — ăn uống và lời nói cần chừng mực."},{n:28,ten:"Trạch Phong Đại Quá",lo:"Tốn",up:"Đoài",y:"Quá mức, gánh nặng lớn — phi thường mà thận trọng."},{n:29,ten:"Thuần Khảm",lo:"Khảm",up:"Khảm",y:"Hiểm trùng hiểm — giữ lòng thành tín để vượt qua."},{n:30,ten:"Thuần Ly",lo:"Ly",up:"Ly",y:"Sáng rõ, bám víu chính đạo, soi tỏ."},{n:31,ten:"Trạch Sơn Hàm",lo:"Cấn",up:"Đoài",y:"Cảm ứng, rung động, giao cảm chân thành (tình duyên)."},{n:32,ten:"Lôi Phong Hằng",lo:"Tốn",up:"Chấn",y:"Bền lâu, kiên trì giữ đạo thường hằng."},{n:33,ten:"Thiên Sơn Độn",lo:"Cấn",up:"Càn",y:"Lui ẩn đúng lúc, tránh xa điều xấu."},{n:34,ten:"Lôi Thiên Đại Tráng",lo:"Càn",up:"Chấn",y:"Cường thịnh, mạnh mẽ — dùng sức hợp lẽ."},{n:35,ten:"Hỏa Địa Tấn",lo:"Khôn",up:"Ly",y:"Tiến lên, thăng tiến, rạng rỡ."},{n:36,ten:"Địa Hỏa Minh Di",lo:"Ly",up:"Khôn",y:"Ánh sáng bị che — giấu tài chờ thời, giữ chính."},{n:37,ten:"Phong Hỏa Gia Nhân",lo:"Ly",up:"Tốn",y:"Đạo nhà, trên dưới thuận, mỗi người tròn vai."},{n:38,ten:"Hỏa Trạch Khuê",lo:"Đoài",up:"Ly",y:"Trái lìa, hiểu lầm — tìm điểm chung trong dị biệt."},{n:39,ten:"Thủy Sơn Kiển",lo:"Cấn",up:"Khảm",y:"Gian nan, bước khó — nên dừng, cầu trợ giúp."},{n:40,ten:"Lôi Thủy Giải",lo:"Khảm",up:"Chấn",y:"Cởi mở, hóa giải, thoát khỏi khó khăn."},{n:41,ten:"Sơn Trạch Tổn",lo:"Đoài",up:"Cấn",y:"Bớt đi, hy sinh cái nhỏ vì lợi lớn."},{n:42,ten:"Phong Lôi Ích",lo:"Chấn",up:"Tốn",y:"Tăng ích, lợi mình lợi người, hành thiện."},{n:43,ten:"Trạch Thiên Quải",lo:"Càn",up:"Đoài",y:"Quyết đoán, dứt khoát trừ điều xấu."},{n:44,ten:"Thiên Phong Cấu",lo:"Tốn",up:"Càn",y:"Gặp gỡ bất ngờ — cẩn trọng với cám dỗ."},{n:45,ten:"Trạch Địa Tụy",lo:"Khôn",up:"Đoài",y:"Tụ họp, quy tụ lòng người."},{n:46,ten:"Địa Phong Thăng",lo:"Tốn",up:"Khôn",y:"Đi lên, thăng tiến dần dần."},{n:47,ten:"Trạch Thủy Khốn",lo:"Khảm",up:"Đoài",y:"Khốn cùng, bị vây — giữ chí, chờ thoát."},{n:48,ten:"Thủy Phong Tỉnh",lo:"Tốn",up:"Khảm",y:"Giếng nước nuôi dân — nguồn lực bền, cần tu sửa."},{n:49,ten:"Trạch Hỏa Cách",lo:"Ly",up:"Đoài",y:"Cải cách, thay cũ đổi mới đúng thời."},{n:50,ten:"Hỏa Phong Đỉnh",lo:"Tốn",up:"Ly",y:"Đỉnh vạc — nuôi dưỡng hiền tài, đổi mới ổn định."},{n:51,ten:"Thuần Chấn",lo:"Chấn",up:"Chấn",y:"Sấm động, chấn kinh — tỉnh thức, giữ bình tĩnh."},{n:52,ten:"Thuần Cấn",lo:"Cấn",up:"Cấn",y:"Dừng lại, tĩnh tại — biết khi nào nên ngừng."},{n:53,ten:"Phong Sơn Tiệm",lo:"Cấn",up:"Tốn",y:"Tiến từ từ, tuần tự nhi tiến (hôn nhân thuận)."},{n:54,ten:"Lôi Trạch Quy Muội",lo:"Đoài",up:"Chấn",y:"Cưới gả, danh phận — cẩn trọng vị trí."},{n:55,ten:"Lôi Hỏa Phong",lo:"Ly",up:"Chấn",y:"Thịnh đại, rực rỡ — giữ mình giữa lúc đỉnh cao."},{n:56,ten:"Hỏa Sơn Lữ",lo:"Cấn",up:"Ly",y:"Lữ khách xa nhà — khiêm nhường nơi đất lạ."},{n:57,ten:"Thuần Tốn",lo:"Tốn",up:"Tốn",y:"Thuận nhập, mềm mỏng thấm dần, khiêm hòa."},{n:58,ten:"Thuần Đoài",lo:"Đoài",up:"Đoài",y:"Vui đẹp, hòa duyệt, giao tiếp chân thành."},{n:59,ten:"Phong Thủy Hoán",lo:"Khảm",up:"Tốn",y:"Ly tán rồi quy tụ, hóa giải chia rẽ."},{n:60,ten:"Thủy Trạch Tiết",lo:"Đoài",up:"Khảm",y:"Tiết chế, chừng mực, giữ điều độ."},{n:61,ten:"Phong Trạch Trung Phu",lo:"Đoài",up:"Tốn",y:"Thành tín tự trong lòng, cảm hóa bằng chân thành."},{n:62,ten:"Lôi Sơn Tiểu Quá",lo:"Cấn",up:"Chấn",y:"Vượt nhỏ — việc nhỏ nên cẩn trọng, chớ làm lớn."},{n:63,ten:"Thủy Hỏa Ký Tế",lo:"Ly",up:"Khảm",y:"Đã xong, viên mãn — đề phòng buông lơi."},{n:64,ten:"Hỏa Thủy Vị Tế",lo:"Khảm",up:"Ly",y:"Chưa xong, sắp hoàn tất — kiên trì đến cùng."}],co={3:"Khởi đầu nào cũng rối và chậm. Đừng nản — kiên trì từng bước nhỏ và đừng ngại nhờ người giúp, rồi sẽ thông.",6:"Đang có bất hòa, tranh chấp. Tốt nhất ngồi lại hòa giải, nhường một bước giữ hòa khí — thắng lý chưa chắc thắng lòng.",12:"Một quãng trì trệ, khó thông. Đây chỉ là giai đoạn tạm — giữ mình ngay thẳng, làm điều trong tầm tay và chờ thời điểm tốt hơn.",18:"Có việc cũ bê trễ cần sửa. Bình tĩnh dọn dẹp, chấn chỉnh dần từng phần — sửa được thì mọi thứ tốt lên.",23:"Giai đoạn hao mòn, đi xuống. Hãy giữ gìn nền tảng, khoan phiêu lưu; tới đáy rồi sẽ phục hồi.",28:"Đang gánh quá sức, mất cân đối. Bớt ôm đồm, củng cố lại điểm tựa và xin trợ giúp trước khi quá tải.",29:"Khó khăn nối tiếp khó khăn. Giữ bình tĩnh và thành thật, đi qua từng việc một — quen dần sẽ vượt được, đừng hoảng.",33:"Nên lùi một bước, tạm rút lui. Rút đúng lúc không phải là thua — là giữ sức cho cơ hội sau.",36:"Tài năng tạm bị che, gặp môi trường chưa thuận. Cứ kín đáo giữ mình, chờ thời — khoan phô trương lúc này.",38:"Đang lệch pha, hiểu lầm nhau. Tìm một điểm chung nhỏ và nói cho rõ — khác biệt không có nghĩa là đối đầu.",39:"Đường đang khó đi, vướng trở ngại. Khôn ngoan thì dừng lại, đổi cách hoặc tìm người đồng hành thay vì cố lao tới.",41:"Phải bớt đi, hy sinh một phần. Giảm cái rườm rà, tập trung điều cốt lõi — chịu thiệt nay để được về sau.",47:"Đang bị bó buộc, thiếu nguồn lực và mệt mỏi. Giữ vững tinh thần, lời nói đáng tin, kiên nhẫn chờ — khó rồi sẽ qua.",59:"Có sự rời rạc, ly tán. Đây là lúc hóa giải hiềm khích và kết nối lại; mềm mỏng sẽ gom được lòng người."};xe.forEach(n=>{co[n.n]&&(n.an=co[n.n])});const py=n=>In[n.lo].bits+In[n.up].bits,Tm={};xe.forEach(n=>{Tm[py(n)]=n});function yc(n){return Tm[n]||null}function fy(){let n=0;for(let t=0;t<3;t++)n+=Math.random()<.5?3:2;return{val:n,yang:n===7||n===9,changing:n===6||n===9}}function jm(){const n=Array.from({length:6},fy),t=n.map(r=>r.yang?"1":"0").join(""),e=yc(t),i=n.some(r=>r.changing);let c=null;if(i){const r=n.map(l=>l.changing?l.yang?"0":"1":l.yang?"1":"0").join("");c=yc(r)}return{lines:n,present:e,changed:c,changingPos:n.map((r,l)=>r.changing?l+1:null).filter(Boolean)}}const vy={1:'Sức sáng tạo cương kiện đang ở đỉnh; trời vận hành không ngừng nghỉ. Hãy chủ động, chính trực và bền bỉ như rồng, nhưng nhớ "lên quá cao mà kiêu thì hối hận".',2:"Đức nhu thuận, bao dung và nâng đỡ như đất chở muôn vật. Thành công đến khi bạn đi theo, hỗ trợ và kiên nhẫn thay vì tranh đi trước; giữ sự ngay thẳng bền bỉ.",3:"Buổi đầu gian nan như mầm non rẽ đất, rối ren và nhiều trắc trở. Đừng vội tiến; hãy tìm cộng sự, kiên trì sắp xếp rồi thời cơ sẽ mở.",4:"Còn non dại, mông muội cần được khai sáng. Hãy khiêm tốn học hỏi, tìm thầy tìm bạn; người dạy cũng cần kiên nhẫn đúng lúc.",5:"Cần chờ đợi đúng thời và nuôi dưỡng thực lực. Có lòng thành tín thì hanh thông; nóng vội vượt sông lúc nước xiết là tự chuốc nguy.",6:"Tranh chấp, kiện tụng đang manh nha. Nên dè dặt, tìm hòa giải và người trung gian công minh; cố thắng đến cùng thường gặt bất lợi.",7:"Dụng binh, tổ chức lực lượng cần kỷ luật và người dẫn dắt chính danh. Hành động vì lẽ phải và được lòng người thì mới vững.",8:"Thân ái, quy tụ và đoàn kết quanh một trung tâm đáng tin. Đến sớm với lòng thành thì tốt; chần chừ hay hai lòng thì muộn màng.",9:"Sức tích lũy còn nhỏ, chỉ đủ kìm hãm tạm thời. Hãy trau dồi nội lực và nhẫn nại chờ mây tụ thành mưa; chưa phải lúc làm lớn.",10:"Bước đi thận trọng như đạp lên đuôi cọp mà không bị cắn. Giữ lễ, cẩn trọng và đúng mực thì vượt qua được hiểm.",11:"Trời đất giao hòa, trên dưới thông suốt — thời thái bình hanh thông. Hãy tận dụng vận tốt để vun đắp, nhưng nhớ thịnh tất có lúc suy.",12:"Bế tắc, trên dưới cách trở, tiểu nhân đắc thế. Quân tử nên thu mình giữ đức và chờ thời, chớ cố vùng vẫy lúc này.",13:"Đồng lòng hợp quần vì mục tiêu chung, công khai và chính trực. Hợp tác rộng rãi sẽ giúp vượt qua cả khó khăn lớn.",14:"Sở hữu lớn, thịnh vượng và sáng rỡ. Giữ được nhờ khiêm nhường, sáng suốt và biết chia sẻ; kiêu căng thì sẽ mất.",15:"Khiêm tốn, nhún nhường mà vẫn vững như núi giấu trong lòng đất. Đây là đức bền vững nhất — càng khiêm càng được kính trọng và thành công.",16:"Hứng khởi, vui hòa và thuận thời để chuẩn bị hành động. Có kế hoạch và được lòng người thì thuận lợi; chớ buông thả trong an vui.",17:"Tùy thời mà thuận theo lẽ phải, linh hoạt thích ứng. Đi theo điều đúng và người hiền thì hanh thông; tùy tiện chạy theo thì hỏng.",18:"Việc cũ đổ nát cần chỉnh đốn, sửa chữa những sai lầm tích tụ. Mạnh dạn cải tổ từ gốc, cẩn trọng cả trước lẫn sau thì mới yên.",19:"Thời tiến tới, ảnh hưởng lớn dần như bề trên đến với dân. Hãy lãnh đạo bằng đức và sự chân thành, nhưng nhớ thịnh có kỳ hạn.",20:"Quan sát và chiêm nghiệm sâu sắc trước khi hành động. Lấy mình làm gương, nhìn rộng thời thế để hiểu và được tin phục.",21:"Cắn vỡ vật cản giữa hai hàm răng — trừ bỏ trở ngại một cách dứt khoát. Dùng quy tắc minh bạch và công bằng để thông suốt.",22:"Trang sức, vẻ đẹp và hình thức làm mọi thứ rạng rỡ. Hình thức đẹp là tốt, nhưng phải đi cùng nội dung thực chất, đừng phù phiếm.",23:"Bóc mòn, suy lạc — âm thịnh dương suy, nền tảng lung lay. Nên giữ gìn, ẩn nhẫn chờ qua giai đoạn này, không phải lúc tiến.",24:"Dương khí quay về sau cực điểm của âm — hồi sinh và trở lại. Sửa sai rồi bắt đầu lại đúng lúc; thuận theo chu kỳ tự nhiên.",25:"Chân thành, vô tư, thuận theo lẽ tự nhiên không vọng cầu. Giữ lòng ngay thẳng thì hanh; mưu tính trái đạo dễ gặp họa bất ngờ.",26:"Tích chứa lớn về tài lực và đức hạnh, dồn nén chờ ngày bung ra. Nuôi dưỡng và kiềm chế đúng lúc, biết dùng người hiền thì lợi lớn.",27:"Nuôi dưỡng — ăn uống và lời nói đều cần chừng mực, đúng đắn. Hãy chăm cả nuôi thân lẫn nuôi tâm, giữ gìn lời ăn tiếng nói.",28:"Gánh nặng vượt sức, xà nhà cong oằn — một tình thế phi thường. Cần biện pháp khác thường nhưng vẫn thận trọng, đừng để quá đà.",29:"Hiểm trùng hiểm như nước trong vực sâu. Giữ lòng thành tín và bản lĩnh, quen dần với hiểm thì mới thoát ra được.",30:"Sáng rõ, bám víu vào chính đạo như lửa cần củi để cháy. Nương vào điều đúng và người sáng suốt thì rạng rỡ; giữ sự ôn hòa.",31:"Cảm ứng, rung động và giao cảm chân thành — điềm tốt cho tình duyên. Hai bên thành thật cảm nhau thì hợp; chớ giả tạo hay vụ lợi.",32:"Bền lâu, kiên trì giữ đạo thường hằng. Thành công đến từ sự kiên định có nguyên tắc, không phải cố chấp bất biến.",33:"Lui ẩn đúng lúc khi tiểu nhân đang lên. Rút lui khôn ngoan để giữ mình không phải là thua, mà là biết chờ thời.",34:"Cường thịnh, sức mạnh dồi dào như sấm vang giữa trời. Dùng sức phải hợp lẽ và chính đáng; mạnh mà thô bạo sẽ vấp ngã.",35:"Tiến lên, thăng tiến và rạng rỡ như mặt trời mọc. Đây là thời cơ tốt để tiến thân bằng đức sáng và sự tín nhiệm.",36:"Ánh sáng bị che lấp, người hiền gặp thời tăm tối. Hãy giấu tài, giữ chí và sự ngay thẳng bên trong, chờ trời sáng trở lại.",37:"Đạo nhà — mỗi người tròn vai, trên dưới thuận hòa. Trị nhà ngay ngắn từ bên trong thì mọi việc bên ngoài đều yên.",38:"Trái lìa, khác biệt và hiểu lầm gây chia rẽ. Việc lớn khó thành, nhưng việc nhỏ vẫn nên; hãy tìm điểm chung trong dị biệt.",39:"Gian nan, bước đi khập khiễng trước hiểm trở. Nên dừng lại, cầu người giúp và xét lại mình thay vì liều tiến.",40:"Cởi mở, hóa giải sau cơn bế tắc như băng tan. Hãy tha thứ, buông bỏ và mau giải quyết tồn đọng; chủ động thì có lợi.",41:"Bớt dưới ích trên — hy sinh, giảm chi để dồn cho điều lớn hơn. Thành tâm và chừng mực thì sự giảm bớt lại hóa thành lợi.",42:"Tăng ích, lợi mình lợi người, người trên giúp người dưới. Thời thuận để hành thiện và làm việc lớn; hành động mau thì tốt.",43:"Quyết đoán dứt khoát để trừ bỏ điều xấu cuối cùng. Hãy công khai chính trực, cẩn trọng dùng sức, chớ chủ quan khinh địch.",44:"Gặp gỡ bất ngờ, một mầm âm mới sinh dưới quần dương. Cẩn trọng với cám dỗ và kẻ tiểu nhân mới xuất hiện, chớ vội kết thân.",45:"Tụ họp, quy tụ lòng người về một mối. Cần người lãnh đạo chính danh và lòng thành; nơi đông người cũng nên phòng biến cố.",46:"Đi lên dần dần như mầm cây xuyên qua đất. Tích lũy từng bước, theo người trên đáng tin thì thăng tiến hanh thông.",47:"Khốn cùng, bị vây hãm và cạn kiệt nguồn lực. Giữ chí và lời nói đáng tin, an nhiên chờ thoát; than vãn lúc này vô ích.",48:"Giếng nước nuôi dân — nguồn lực bền nhưng cần khơi thông, tu sửa. Nuôi dưỡng người khác và giữ nguồn trong sạch là điều cốt lõi.",49:"Cách mạng, thay cũ đổi mới khi thời cơ đã chín. Cải cách phải hợp lòng người và đúng thời thì mới được tin theo.",50:"Đỉnh vạc nấu chín, nuôi dưỡng hiền tài và đổi mới trong ổn định. Định vị đúng và vững vàng thì hanh thông lớn.",51:"Sấm động dồn dập gây chấn kinh. Giữ được bình tĩnh và lòng kính sợ giữa biến động thì vô sự, sau cơn sợ lại an.",52:"Dừng lại đúng lúc, tĩnh tại như núi. Biết khi nào nên ngừng và an trú trong hiện tại thì lòng yên, không lỗi.",53:"Tiến từ từ, tuần tự như cây lớn dần trên núi — điềm tốt cho hôn nhân. Theo đúng trình tự và kiên nhẫn thì bền vững.",54:"Cưới gả, kết hợp nhưng danh phận chưa chính. Cẩn trọng với vị trí và động cơ; nóng vội theo cảm xúc dễ sinh hối tiếc.",55:"Thịnh đại, rực rỡ đến đỉnh điểm như mặt trời chính ngọ. Hãy tận hưởng nhưng tỉnh táo, vì lên tới đỉnh rồi sẽ xế bóng.",56:"Lữ khách nơi đất lạ, tạm bợ và đơn độc. Khiêm nhường, cẩn trọng và giữ mình thì yên; kiêu hay sơ suất dễ gặp họa.",57:"Thuận nhập, mềm mỏng thấm dần như gió len khắp nơi. Khiêm hòa, kiên trì theo lẽ phải sẽ đạt mục tiêu; chớ nhu nhược thái quá.",58:"Vui đẹp, hòa duyệt và giao tiếp chân thành. Niềm vui chân thật và đúng đạo thì hanh; vui giả tạo, a dua thì hại.",59:"Ly tán cần được quy tụ lại, hóa giải chia rẽ. Lấy chí lớn và lòng thành để gắn kết mọi người; hành động kịp thời.",60:"Tiết chế, chừng mực và giữ điều độ như từng đốt tre. Có giới hạn hợp lý thì thông; tiết chế khắc nghiệt quá thì khó bền.",61:"Thành tín tự đáy lòng, cảm hóa được cả người lẫn vật. Lòng chân thật là gốc của mọi việc; tin nhau thì vượt được hiểm.",62:"Hơi vượt mức ở việc nhỏ thì được, việc lớn thì không nên. Hãy khiêm cung, cẩn thận tiểu tiết; chớ làm chuyện quá tầm.",63:"Việc đã thành, mọi thứ vào đúng chỗ — viên mãn. Nhưng thành rồi dễ lơi lỏng; phải đề phòng và giữ gìn ngay từ lúc đang yên.",64:"Việc chưa xong, đang ở ngưỡng hoàn tất. Kiên trì và cẩn trọng đến bước cuối; sắp qua sông thì chớ để ướt đuôi."};xe.forEach(n=>{n.luan=vy[n.n]});const wl=[{vi:1,ten:"Sơ hào (1)",y:"Ở dưới cùng — việc mới khởi, lực còn mỏng và ẩn vi. Nên thận trọng dò đường, chưa vội ra mặt."},{vi:2,ten:"Hào hai (2)",y:"Giữa nội quái (đắc trung) — ngôi người dưới tài giỏi, phần nhiều tốt lành. Giữ trung chính thì được tin dùng."},{vi:3,ten:"Hào ba (3)",y:'Cuối nội quái, giáp ranh trên–dưới, "đa hung" (nhiều nguy). Dễ bất an, cần cẩn trọng kẻo vấp.'},{vi:4,ten:"Hào tư (4)",y:'Đầu ngoại quái, sát ngôi vua (hào 5), "đa cụ" (nhiều lo). Phải khiêm thuận, dè dặt khi gần người trên.'},{vi:5,ten:"Hào năm (5)",y:"Giữa ngoại quái (đắc trung) và ngôi chí tôn — thường cát nhất, là chủ quẻ. Nên trung chính, độ lượng."},{vi:6,ten:"Thượng hào (6)",y:'Trên cùng, thời đã đến cùng cực — công thành nên lui. Coi chừng thái quá mà hối (như "kháng long hữu -59-phong-thuy-hoan",60:"que-60-thuy-trach-tiet",61:"que-61-phong-trach-trung-phu",62:"que-62-loi-son-tieu-qua",63:"que-63-thuy-hoa-ky-te",64:"que-64-hoa-thuy-vi-te"};xe.forEach(n=>{n.src="https://dich.kabala.vn/"+xy[n.n]});const ro={1:"Càn",2:"Đoài",3:"Ly",4:"Chấn",5:"Tốn",6:"Khảm",7:"Cấn",8:"Khôn"};function ky(n,t,e,i){const c=T=>T%8===0?8:T%8,r=T=>T%6===0?6:T%6,l=((n-4)%12+12)%12+1,a=Math.floor((i%24+1)%24/2)%12+1,s=l+t+e,o=s+a,u=ro[c(s)],m=ro[c(o)],d=r(o),k=yc(In[m].bits+In[u].bits),x=(In[m].bits+In[u].bits).split("");x[d-1]=x[d-1]==="1"?"0":"1";const b=yc(x.join(""));return{yearNum:l,hourNum:a,upper:u,lower:m,dong:d,present:k,changed:b}}const lo={1:"Trời vận hành mạnh mẽ; quân tử lấy đó mà tự cường không nghỉ.",2:"Đất có đức dày; quân tử lấy đó mà lấy đức dày nâng đỡ muôn vật.",3:"Mây và sấm; quân tử lấy đó mà gây dựng, sắp đặt việc đời (kinh luân).",4:"Dưới núi suối chảy ra; quân tử lấy đó mà quả quyết hành động, nuôi dưỡng đức.",5:"Mây lên trời; quân tử lấy đó mà ăn uống yến lạc, an nhiên chờ thời.",6:"Trời và nước đi ngược nhau; quân tử lấy đó mà làm việc gì cũng tính kỹ từ đầu.",7:"Giữa đất có nước; quân tử lấy đó mà bao dung dân, nuôi chứa quần chúng.",8:"Trên đất có nước; tiên vương lấy đó mà lập muôn nước, thân với chư hầu.",9:"Gió đi trên trời; quân tử lấy đó mà trau dồi văn đức.",10:"Trên trời dưới đầm; quân tử lấy đó mà phân định trên dưới, yên lòng dân.",11:"Trời đất giao hòa; vua lấy đó mà thành tựu đạo trời đất, giúp đỡ dân.",12:"Trời đất không giao; quân tử lấy đó mà kiệm đức tránh nạn, không màng vinh lộc.",13:"Trời cùng lửa; quân tử lấy đó mà phân loại sự vật, biện rõ đồng dị.",14:"Lửa ở trên trời; quân tử lấy đó mà ngăn ác dương thiện, thuận theo mệnh trời.",15:"Trong đất có núi; quân tử lấy đó mà bớt chỗ nhiều bù chỗ ít cho công bằng.",16:"Sấm vang động đất; tiên vương lấy đó mà làm nhạc tôn đức, dâng lên trời.",17:"Trong đầm có sấm; quân tử lấy đó mà tối đến thì vào nghỉ ngơi.",18:"Dưới núi có gió; quân tử lấy đó mà chấn hưng dân, nuôi dưỡng đức.",19:"Trên đầm có đất; quân tử lấy đó mà dạy dỗ không cùng, bao dung giữ dân không bờ.",20:"Gió đi trên đất; tiên vương lấy đó mà xem xét các phương, đặt ra giáo hóa.",21:"Sấm chớp cùng tới; tiên vương lấy đó mà làm rõ hình phạt, sửa sang pháp luật.",22:"Dưới núi có lửa; quân tử lấy đó mà làm sáng việc chính, không xử ngục tụng cẩu thả.",23:"Núi tựa trên đất; người trên lấy đó mà hậu đãi kẻ dưới, an ổn nhà cửa.",24:"Sấm ở trong đất; tiên vương lấy đó mà ngày đông chí đóng cửa, thương lữ ngừng đi.",25:"Dưới trời sấm động, muôn vật vô vọng (chân thật); tiên vương lấy đó mà nuôi muôn vật hợp thời.",26:"Trong núi có trời; quân tử lấy đó mà ghi nhớ lời xưa nết cũ để nuôi đức.",27:"Dưới núi có sấm; quân tử lấy đó mà thận trọng lời nói, tiết độ ăn uống.",28:"Đầm ngập cây; quân tử lấy đó mà đứng một mình không sợ, lánh đời không buồn.",29:"Nước chảy tới không ngừng; quân tử lấy đó mà giữ đức hạnh bền, lo việc dạy dỗ.",30:"Hai lửa nối sáng; bậc đại nhân lấy đó mà nối ánh sáng, soi khắp bốn phương.",31:"Trên núi có đầm; quân tử lấy đó mà giữ lòng trống (khiêm hư) để dung nạp người.",32:"Sấm và gió; quân tử lấy đó mà đứng vững, không đổi phương hướng.",33:"Dưới trời có núi; quân tử lấy đó mà xa kẻ tiểu nhân, nghiêm mà không ghét.",34:"Sấm ở trên trời; quân tử lấy đó mà không hợp lễ thì không làm.",35:"Mặt trời mọc trên đất; quân tử lấy đó mà tự làm sáng cái đức sáng của mình.",36:"Ánh sáng lặn vào trong đất; quân tử lấy đó mà cai trị dân, giấu sáng mà vẫn sáng.",37:"Gió từ lửa sinh ra; quân tử lấy đó mà lời nói có thực, việc làm có thường.",38:"Trên lửa dưới đầm; quân tử lấy đó mà hòa hợp nhưng vẫn giữ riêng (hòa nhi bất đồng).",39:"Trên núi có nước; quân tử lấy đó mà quay vào tự xét mình, sửa đức.",40:"Sấm mưa nổi lên; quân tử lấy đó mà tha thứ lỗi lầm, khoan dung tội nhẹ.",41:"Dưới núi có đầm; quân tử lấy đó mà kiềm chế giận dữ, ngăn ngừa dục vọng.",42:"Gió và sấm; quân tử lấy đó mà thấy điều thiện thì làm theo, có lỗi thì sửa.",43:"Đầm bốc lên trời; quân tử lấy đó mà ban lộc xuống dưới, kỵ thói chứa đức kiêu.",44:"Dưới trời có gió; vua lấy đó mà ban mệnh lệnh, truyền khắp bốn phương.",45:"Trên đất có đầm; quân tử lấy đó mà sửa sang binh khí, phòng việc bất ngờ.",46:"Trong đất sinh cây; quân tử lấy đó mà thuận đức, chứa cái nhỏ thành cao lớn.",47:"Đầm cạn nước; quân tử lấy đó mà liều mình để đạt được chí hướng.",48:"Trên cây có nước (giếng); quân tử lấy đó mà khuyên dân làm lụng, giúp đỡ nhau.",49:"Trong đầm có lửa; quân tử lấy đó mà làm lịch, định rõ thời tiết.",50:"Trên cây có lửa (vạc); quân tử lấy đó mà giữ ngôi cho chính, ngưng tụ mệnh trời.",51:"Sấm nối tiếp sấm; quân tử lấy đó mà sợ hãi tu tỉnh, tự xét mình.",52:"Núi liền núi; quân tử lấy đó mà nghĩ không ra ngoài cương vị của mình.",53:"Trên núi có cây; quân tử lấy đó mà giữ đức hiền, làm tốt phong tục.",54:"Trên đầm có sấm; quân tử lấy đó mà nghĩ tới cái kết để biết chỗ hỏng.",55:"Sấm chớp đều tới; quân tử lấy đó mà xử kiện công minh, thi hành hình phạt.",56:"Trên núi có lửa; quân tử lấy đó mà sáng suốt thận trọng khi dùng hình, không giam giữ lâu.",57:"Gió theo gió; quân tử lấy đó mà ban mệnh lệnh, thi hành công việc.",58:"Hai đầm liền nhau; quân tử lấy đó mà cùng bạn bè giảng tập, học hỏi.",59:"Gió đi trên nước; tiên vương lấy đó mà tế trời, lập tông miếu.",60:"Trên đầm có nước; quân tử lấy đó mà chế định mức độ, bàn về đức hạnh.",61:"Trên đầm có gió; quân tử lấy đó mà bàn kỹ án từ, hoãn việc tử hình.",62:"Trên núi có sấm; quân tử lấy đó mà cung kính, thương xót, tiết kiệm có phần hơn mức thường.",63:"Nước ở trên lửa; quân tử lấy đó mà lo nghĩ hoạn nạn mà phòng bị từ trước.",64:"Lửa ở trên nước; quân tử lấy đó mà thận trọng phân biệt sự vật, để mỗi thứ ở đúng chỗ."};xe.forEach(n=>{lo[n.n]&&(n.tuong=lo[n.n])});xe.forEach(n=>{const t=dy[n.n];t&&(n.thoan=t.thoan,n.hao=t.hao,t.dung&&(n.dung=t.dung))});function xc({up:n,lo:t,w:e=50}){const i=Math.max(5,Math.round(e/9)),c=({y:l})=>h.jsx("div",{className:"flex justify-between items-center",style:{height:i},children:l?h.jsx("spa  hung tinh tốt. Mặt cần lưu ý: dễ an phận, ngại va chạm, đôi khi thiếu nghị lực bứt phá."},"Liêm Trinh":{hanh:"Hỏa",tom:"Tù tinh — nguyên tắc, phức tạp",y:"Sao của kỷ luật và đam mê — vừa cứng rắn nguyên tắc, vừa giàu cảm xúc, đào hoa. Bản lĩnh, dám đương đầu. Mặt cần lưu ý: dễ vướng thị phi, tình cảm hoặc kiện tụng nếu gặp hung tinh."},"Thiên Phủ":{hanh:"Thổ",tom:"Khố tinh — ổn định, biết tích lũy",y:"Sao kho tàng: vững vàng, bao dung, thận trọng, biết dành dụm và gìn giữ. Đem lại sự an ổn. Mặt cần lưu ý: hơi cầu an, giữ của, thiếu mạo hiểm."},"Thái Âm":{hanh:"Thủy",tom:"Phú tinh — dịu dàng, tinh tế",y:"Mặt trăng: nhu hòa, tình cảm, giàu trực giác và óc thẩm mỹ, chủ về tài sản – điền trạch. Mặt cần lưu ý: đa cảm, dễ u sầu; sáng tối tùy giờ và vị trí."},"Tham Lang":{hanh:"Mộc/Thủy",tom:"Đào hoa — đa tài, nhiều ham muốn",y:"Sao của dục vọng và tài lẻ: đa tài đa nghệ, giao tế giỏi, ham học hỏi và hưởng thụ, sức sống mạnh. Mặt cần lưu ý: dễ sa đà vào hưởng lạc, ôm đồm nhiều thứ."},"Cự Môn":{hanh:"Thủy",tom:"Ám tinh — khẩu tài, lý luận",y:"Sao của lời nói và suy xét: giỏi ăn nói, biện luận, nghiên cứu, hoài nghi để tìm sự thật. Hợp nghề dùng miệng lưỡi. Mặt cần lưu ý: dễ thị phi, hiểu lầm, lời ra tiếng vào."},"Thiên Tướng":{hanh:"Thủy",tom:"Ấn tinh — trung hậu, công bằng",y:"Sao ấn tín: trung thực, chính trực, thích giúp đỡ và phục vụ, trọng nghĩa. Là người phụ tá đắc lực. Mặt cần lưu ý: cần minh chủ để nương theo, tự thân khởi xướng hơi yếu."},"Thiên Lương":{hanh:"Thổ",tom:"Ấm tinh — chính trực, che chở",y:"Sao phúc thọ và che chở: nguyên tắc, giàu kinh nghiệm, hay giúp người gỡ nạn; hợp y, giáo, pháp luật, tư vấn. Mặt cần lưu ý: thích lo việc thiên hạ, đôi khi cô độc, ưa nói thẳng."},"Thất Sát":{hanh:"Kim/Hỏa",tom:"Tướng tinh — quả cảm, độc lập",y:"Sao chủ tướng: dũng mãnh, độc lập, dám nghĩ dám làm, chịu được áp lực. Hợp khai phá, chỉ huy. Mặt cần lưu ý: cương mãnh, cuộc đời nhiều thăng trầm, cần học sự mềm dẻo."},"Phá Quân":{hanh:"Thủy",tom:"Hao tinh — phá cách, tiên phong",y:"Sao đổi mới: dám phá bỏ cái cũ, tiên phong, không theo lối mòn, giàu sức bứt phá. Mặt cần lưu ý: hay hao tán, đời sống biến động, cần một hướng đi rõ để dồn sức."}},Co={"Tả Phù":"Quý nhân phò tá — người tin cẩn giúp đỡ ở bên.","Hữu Bật":"Quý nhân phò tá — được nâng đỡ, cộng sự tốt.","Văn Xương":"Văn tinh — học hành, thi cử, văn chương, sự chỉn chu.","Văn Khúc":"Văn tinh — tài hoa, khéo léo, nghệ thuật, ăn nói.","Thiên Khôi":"Quý nhân (ban ngày) — gặp may, được người trên nâng đỡ.","Thiên Việt":"Quý nhân (ban đêm) — cơ hội và trợ lực bất ngờ.","Lộc Tồn":"Sao tài lộc — tích lũy, phúc về tiền bạc, dành dụm.","Kình Dương":"Sát tinh sắc bén — quyết liệt nhưng dễ va chạm, thương tổn.","Đà La":"Sát tinh trì trệ — vướng mắc, chậm trễ, day dứt.","Hỏa Tinh":"Nóng vội, biến động bất ngờ; gặp cát tinh có thể thành uy lực.","Linh Tinh":"Âm ỉ, thay đổi khó lường; cần điềm tĩnh để hóa giải.","Địa Không":"Hư không — nghĩ khác người, dễ hao hụt; tu tâm thì nhẹ.","Địa Kiếp":"Hao tán — mất mát ngoài ý; bớt phiêu lưu liều lĩnh thì ổn.","Thiên Mã":'Sao di chuyển — bôn ba, đi xa, thay đổi; gặp Lộc Tồn là "Lộc Mã" tốt.',"Đào Hoa":"Sao duyên — hấp dẫn, giao tế, dễ có người để ý.","Hồng Loan":"Sao hỉ duyên — nhân duyên, cưới hỏi, tin vui.","Thiên Hỷ":"Sao hỉ sự — vui mừng, con cái, việc tốt lành.","Thiên Khốc":"Ưu tư, dễ chạnh lòng — hợp người làm việc cảm xúc/nghệ thuật.","Thiên Hư":"Trống trải, hao tổn tinh thần — cần chỗ dựa và mục tiêu."},ak={Lộc:"Hóa Lộc — thêm tài lộc, thuận lợi, mở đường (cát).",Quyền:"Hóa Quyền — thêm quyền lực, năng lực, sự chủ động (cát).",Khoa:"Hóa Khoa — thêm danh tiếng, văn vẻ, quý nhân, thi cử (cát).",Kỵ:"Hóa Kỵ — vướng mắc, trở ngại, hao tổn; nhắc ta thận trọng (cần lưu ý)."},sk={Mệnh:"Bản thân — tính cách cốt lõi, con người và vận mệnh tổng quát; cung quan trọng nhất.","Phụ Mẫu":"Cha mẹ & bề trên — quan hệ với cha mẹ/cấp trên, học vấn, tướng mạo, phúc ấm thừa hưởng.","Phúc Đức":"Phúc phần & tinh thần — sự an vui trong tâm, hưởng thụ, phúc khí tổ   <div id="root"><noscript>
    <h1>Tam Sở — Tarot · Thần số học · Tử vi · Chiêm tinh · Kinh Dịch</h1>
    <p>Công cụ huyền học tiếng Việt miễn phí, chạy hoàn toàn trên trình duyệt — không cần đăng nhập, không thu thập dữ liệu. Tam Sở tách bạch phần tính toán kiểm chứng được và phần luận giải truyền thống.</p>
    <h2>Các hệ thống</h2>
    <ul>
      <li><strong>Tarot (78 lá Rider–Waite–Smith):</strong> lá bài hôm nay, nhiều kiểu trải bài, bài ngược, ý nghĩa xuôi/ngược, lời khuyên và luận Tình yêu/Sự nghiệp.</li>
      <li><strong>Thần số học (Pythagorean):</strong> Số Chủ Đạo, Vận Mệnh, Linh Hồn, Nhân Cách, Lo Shu, Năm cá nhân, Đỉnh cao &amp; Thử thách, bảng hợp Số Chủ Đạo.</li>
      <li><strong>Tử vi · Can Chi:</strong> Can Chi năm/ngày/giờ, nạp âm, tự quy đổi âm lịch, hợp tuổi, giờ hoàng đạo, Tam Tai, cung phi Bát Trạch, Sao hạn và bảng hợp tuổi 12 con giáp.</li>
      <li><strong>Cung hoàng đạo:</strong> 12 cung phương Tây, decan, màu/đá/số may mắn và bảng tương hợp 12×12.</li>
      <li><strong>Kinh Dịch:</strong> gieo quẻ bằng đồng xu hoặc Mai Hoa Dịch Số, luận hào động, tra cứu đủ 64 quẻ kèm nguyên văn thoán/hào từ.</li>
      <li><strong>Tương hợp &amp; Hồ sơ tổng hợp:</strong> ghép hai ngày sinh qua ba hệ; hồ sơ một-lần-nhập kèm báo cáo theo chủ đề.</li>
    </ul>
    <p>Đây là các hệ thống tín ngưỡng – văn hóa, không phải khoa học và không có năng lực tiên đoán đã kiểm chứng; nội dung dành cho tham khảo và chiêm nghiệm. Vui lòng bật JavaScript để dùng đầy đủ.</p>
  </noscript></div>
